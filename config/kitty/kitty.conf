# vim:fileencoding=utf-8:foldmethod=marker

# Fonts {{{

# Nerd Fonts v3.3.0
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

font_family      family='CaskaydiaCove Nerd Font Mono' postscript_name=CaskaydiaCoveNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto

# }}}

# Layouts {{{

enabled_layouts splits

# }}}

# Window {{{

window_border_width 0.5pt
draw_minimal_borders yes

# }}}

# Tab Bar {{{

tab_bar_edge bottom
tab_bar_min_tabs 0
tab_separator " ┇"
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #000000
active_tab_background   #39FF14
active_tab_font_style   bold
inactive_tab_foreground #D8DEE9
inactive_tab_background #4C566A
inactive_tab_font_style normal
tab_bar_background      #2E3440

# }}}

# Remote Control {{{

allow_remote_control yes
listen_on unix:${TMPDIR}/kitty.sock

# }}}

# Key Mappings {{{

map cmd+enter discard_event

# Tab management (ctrl+b prefix, tmux-style)
map ctrl+b>c new_tab
map ctrl+b>d close_tab
map ctrl+b>n next_tab
map ctrl+b>p previous_tab

# Splits
map ctrl+b>- launch --location=hsplit
map ctrl+b>| launch --location=vsplit
map ctrl+b>\ launch --location=vsplit
map ctrl+b>D detach_window new-tab

# Pane navigation (seamless with nvim via vim-kitty-navigator)
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
map --when-focus-on var:IS_VIM=true ctrl+h
map --when-focus-on var:IS_VIM=true ctrl+j
map --when-focus-on var:IS_VIM=true ctrl+k
map --when-focus-on var:IS_VIM=true ctrl+l

# }}}

# Theme
include current-theme.conf
